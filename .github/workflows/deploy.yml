name: SHIFTLY CD

on:
  push:
    branches:
      - develop       # Automatically deploy to DEV when merged to develop
      - 'release/**'  # Automatically deploy to UAT when pushing to a release branch
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - mo
          - prod
      image_tag:
        description: 'Docker image tag (e.g. ci-abc1234) to deploy'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Deploy to DEV ──────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to DEV
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Deploy to Dev Environment
        run: |
          echo "Deploying to DEV environment..."
          echo "Image tag: ci-${{ github.sha }}"
          # TODO: Insert your container deployment command here.

  # ─── Deploy to UAT ──────────────────────────────────────────────────────────
  deploy-uat:
    name: Deploy to UAT
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - name: Deploy to UAT Environment
        run: |
          echo "Deploying to UAT environment..."
          echo "Image tag: ci-${{ github.sha }}"
          # TODO: Insert your container deployment command here.

  # ─── Deploy to MO (Model Office) ────────────────────────────────────────────
  deploy-mo:
    name: Deploy to MO
    # Optional: We restrict MO deployment so it can only be triggered from a release branch
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'mo' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    environment: mo
    steps:
      - name: Deploy to MO Environment
        run: |
          echo "Deploying to MO environment..."
          echo "Image tag: ${{ github.event.inputs.image_tag }}"
          # TODO: Insert your container deployment command here.

  # ─── Deploy to PROD ─────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to PROD
    # Optional: We restrict PROD deployment so it can only be triggered from a release branch
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Deploy to PROD Environment
        run: |
          echo "Deploying to PROD environment..."
          echo "Image tag: ${{ github.event.inputs.image_tag }}"
          # TODO: Insert your container deployment command here.
