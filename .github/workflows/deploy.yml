name: SHIFTLY CD

on:
  push:
    branches:
      - release-dev
      - release-uat
      - release-mo
      - release-prod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Deploy to DEV ──────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to DEV
    if: github.event_name == 'push' && github.ref == 'refs/heads/release-dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Deploy to Dev Environment
        run: |
          echo "Deploying to DEV environment..."
          echo "Image tag: ci-${{ github.sha }}"
          # TODO: Insert your container deployment command here.

